<style>
  .calc-container {
    font-family: 'Kanit', sans-serif; /* แนะนำให้ใช้ฟอนต์ไทยที่ดูทันสมัย */
    padding: 25px;
    border-radius: 20px;
    max-width: 400px;
    width: 90%;
    margin: 20px auto;
    background-color: #ffffff;
    border: 1px solid #e0e8f0;
    box-shadow: 0 15px 35px rgba(26, 60, 109, 0.1);
  }
  
  h2 { color: #1a3c6d; margin-top: 0; text-align: center; font-weight: 600; }

  .input-group { margin-bottom: 18px; }
  label { font-weight: 500; color: #4a5568; display: block; margin-bottom: 8px; font-size: 14px; }
  
  input { 
    width: 100%; 
    padding: 14px; 
    border: 2px solid #edf2f7; 
    border-radius: 10px; 
    box-sizing: border-box;
    font-size: 16px;
    transition: border-color 0.3s;
  }
  
  input:focus { border-color: #1a3c6d; outline: none; }
  
  button { 
    width: 100%; 
    padding: 15px; 
    background-color: #1a3c6d; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    font-size: 16px; 
    font-weight: 600;
    transition: background 0.3s;
  }
  
  button:hover { background-color: #2c5282; }
</style>

<div class="calc-container">
  <h2>คำนวณปริมาณน้ำในสระ</h2>
  
  <div class="input-group">
    <label>ความกว้าง (เมตร)</label>
    <input type="number" id="width" placeholder="0.00">
  </div>
  <div class="input-group">
    <label>ความยาว (เมตร)</label>
    <input type="number" id="length" placeholder="0.00">
  </div>
  <div class="input-group">
    <label>ความลึกเฉลี่ย (เมตร)</label>
    <input type="number" id="depth" placeholder="0.00">
  </div>
  
  <button onclick="calculate()">คำนวณปริมาณน้ำ</button>
  
  <div id="result" style="margin-top: 25px; padding: 20px; border-radius: 12px; background-color: #f7fafc; text-align: center; display: none;"></div>
</div>

<script>
function calculate() {
  const w = parseFloat(document.getElementById('width').value);
  const l = parseFloat(document.getElementById('length').value);
  const d = parseFloat(document.getElementById('depth').value);
  const res = document.getElementById('result');
  
  if(w > 0 && l > 0 && d > 0) {
    const m3 = w * l * d;
    const liters = m3 * 1000;
    res.style.display = "block";
    res.style.border = "1px solid #1a3c6d";
    res.innerHTML = `<div style="font-size: 14px; color: #718096; margin-bottom:5px;">ปริมาตรสระของคุณคือ</div>
                     <div style="font-size: 26px; color: #1a3c6d; font-weight: 700;">${m3.toLocaleString()} คิว</div>
                     <div style="font-size: 18px; color: #2d3748; margin-top:5px;">${liters.toLocaleString()} ลิตร</div>`;
  } else {
    res.style.display = "block";
    res.style.border = "1px solid #feb2b2";
    res.style.backgroundColor = "#fff5f5";
    res.innerText = "กรุณากรอกตัวเลขให้ครบถ้วนครับ";
  }
}
</script>
